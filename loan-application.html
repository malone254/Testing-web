<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Application</title>
<style>
  body { font-family: Arial, sans-serif; background:#f3f4f6; margin:0; color:#111827; }
  .container { max-width: 650px; margin:2rem auto; padding:2.5rem; background:white; border-radius:12px; box-shadow:0 6px 12px rgba(0,0,0,0.1);}
  h2 { text-align:center; color:#007aff; margin-bottom:2rem; }
  label { font-weight:bold; display:block; margin-top:1rem; }
  input, select { padding:0.75rem; border-radius:8px; border:1px solid #d1d5db; font-size:1rem; width:100%; margin-top:0.25rem; }
  input:focus, select:focus { outline:none; border-color:#007aff; box-shadow:0 0 5px rgba(0,122,255,0.3);}
  button { padding:0.75rem 1.5rem; background:#007aff; color:white; font-weight:bold; border:none; border-radius:8px; cursor:pointer; margin-top:1.5rem; width:100%; }
</style>
</head>
<body>
<div class="container">
  <h2>Loan Application Form</h2>
  <form id="loanForm">
    
    <!-- Personal Details -->
    <label for="fullName">Full Name</label>
    <input type="text" id="fullName" required placeholder="John Doe">
    
    <label for="dob">Date of Birth</label>
    <input type="date" id="dob" required>
    
    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" required placeholder="0xxxxxxxxx">
    
    <label for="idNumber">ID Number</label>
    <input type="text" id="idNumber" required placeholder="8 digits">
    
    <label for="email">Email Address</label>
    <input type="email" id="email" required placeholder="example@gmail.com">
    
    <label for="residence">Place of Residence</label>
    <input type="text" id="residence" readonly placeholder="Auto-detected">

    <!-- Employment / Income -->
    <label for="monthlyIncome">Monthly Income</label>
    <select id="monthlyIncome" required>
      <option value="">Select Income</option>
      <option value="below10k">Below 10k</option>
      <option value="10k-50k">10k – 50k</option>
      <option value="50k-100k">50k – 100k</option>
      <option value="above100k">Above 100k</option>
    </select>

    <!-- Loan Details -->
    <label for="loanPurpose">Loan Purpose</label>
    <select id="loanPurpose" required>
      <option value="">Select Purpose</option>
      <option value="Business">Business</option>
      <option value="Education">Education</option>
      <option value="Medical">Medical</option>
      <option value="Emergency">Emergency</option>
      <option value="Other">Other</option>
    </select>

    <!-- Referees -->
    <label for="refereeType">Reference Type</label>
    <select id="refereeType" required>
      <option value="">Select Reference</option>
      <option value="Parent">Parent</option>
      <option value="Spouse">Spouse</option>
      <option value="Brother">Brother</option>
      <option value="Sister">Sister</option>
    </select>

    <label for="refereeContact">Choose Contact</label>
    <select id="refereeContact" required>
      <option value="">Select Contact from device</option>
      <!-- Options to be populated dynamically if device API is used -->
    </select>

    <button type="submit">Submit Application</button>
  </form>
</div>

<script>
  // Geolocation for Residence
  const residenceInput = document.getElementById("residence");
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      const {latitude, longitude} = pos.coords;
      residenceInput.value = `Lat: ${latitude.toFixed(3)}, Lon: ${longitude.toFixed(3)}`;
    },err=>{residenceInput.placeholder="Unable to detect location"});
  }

  // Form Validation
  document.getElementById("loanForm").addEventListener("submit", function(e){
    e.preventDefault();
    const dob = new Date(document.getElementById("dob").value);
    const age = new Date().getFullYear() - dob.getFullYear();
    if(age < 18){ alert("You must be 18 years or older."); return; }

    const phone = document.getElementById("phone").value;
    if(!/^0\d{9}$/.test(phone)){ alert("Phone must start with 0 and be 10 digits."); return; }

    const id = document.getElementById("idNumber").value;
    if(!/^\d{8}$/.test(id)){ alert("ID must be exactly 8 digits."); return; }

    const email = document.getElementById("email").value;
    if(!email.endsWith("@gmail.com")){ alert("Email must end with @gmail.com."); return; }

    alert("Application submitted successfully!");
  });
</script>
</body>
</html>
