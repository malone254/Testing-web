<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loan Application - LendEasy</title>
  <link rel="stylesheet" href="styles/style.css">
  <style>
    .application {
      max-width: 500px;
      margin: 3rem auto;
      padding: 2rem;
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .application h2 {
      text-align: center;
      color: #1e3a8a;
      margin-bottom: 1.5rem;
    }
    .application label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: bold;
    }
    .application input, 
    .application select, 
    .application textarea {
      width: 100%;
      padding: 0.5rem;
      margin-bottom: 1rem;
      border-radius: 6px;
      border: 1px solid #d1d5db;
    }
    .application button {
      width: 100%;
      padding: 0.75rem;
      background-color: #3b82f6;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .application button:hover {
      background-color: #1e40af;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">LendEasy</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="borrower.html">Borrower</a></li>
      <li><a href="lender.html">Lender</a></li>
    </ul>
  </nav>

  <section class="application">
    <h2>Loan Application Form</h2>
    <form>
      <label for="amount">Loan Amount ($)</label>
      <input type="number" id="amount" required>

      <label for="term">Repayment Term (Months)</label>
      <select id="term" required>
        <option value="">Select Term</option>
        <option value="1">1 Month</option>
        <option value="3">3 Months</option>
        <option value="6">6 Months</option>
        <option value="12">12 Months</option>
      </select>

      <label for="purpose">Loan Purpose</label>
      <textarea id="purpose" rows="4" required></textarea>

      <button type="submit">Apply Now</button>
    </form>
  </section>

</body>
</html>
