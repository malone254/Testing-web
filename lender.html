<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lender Dashboard - LendEasy</title>
  <link rel="stylesheet" href="styles/style.css">
  <style>
    .dashboard {
      padding: 2rem;
      text-align: center;
    }
    .loan-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 2rem;
    }
    .loan-card {
      background-color: white;
      padding: 1.5rem;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      width: 220px;
      transition: transform 0.2s;
    }
    .loan-card:hover {
      transform: translateY(-5px);
    }
    .loan-card h3 {
      margin-bottom: 0.5rem;
      color: #1e3a8a;
    }
    .loan-card p {
      margin: 0.25rem 0;
    }
    .loan-card .btn {
      margin-top: 0.5rem;
      display: inline-block;
      padding: 0.5rem 1rem;
      background-color: #3b82f6;
      color: white;
      border-radius: 6px;
    }
    .loan-card .btn:hover {
      background-color: #1e40af;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">LendEasy</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="lender.html">Lender</a></li>
      <li><a href="loan-application.html">Borrower Apply Loan</a></li>
    </ul>
  </nav>

  <section class="dashboard">
    <h2>Available Loans to Fund</h2>
    <div class="loan-list">
      <div class="loan-card">
        <h3>Loan #101</h3>
        <p>Amount: $300</p>
        <p>Borrower: John Doe</p>
        <p>Interest: 8%</p>
        <a href="#" class="btn">Fund Loan</a>
      </div>
      <div class="loan-card">
        <h3>Loan #102</h3>
        <p>Amount: $500</p>
        <p>Borrower: Jane Smith</p>
        <p>Interest: 10%</p>
        <a href="#" class="btn">Fund Loan</a>
      </div>
    </div>
  </section>

</body>
</html>
