<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loan Application Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f3f4f6;
      margin: 0;
      padding: 0;
      color: #111827;
    }

    .application-container {
      max-width: 650px;
      margin: 2rem auto;
      padding: 2.5rem;
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #007aff; /* Branch-style blue */
      margin-bottom: 2rem;
      font-size: 2rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    label {
      font-weight: bold;
      margin-bottom: 0.25rem;
    }

    input, select, textarea {
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 1rem;
      width: 100%;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #007aff;
      box-shadow: 0 0 5px rgba(0,122,255,0.3);
    }

    button {
      padding: 0.75rem;
      background-color: #007aff;
      color: white;
      font-weight: bold;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #005bbb;
    }

    .section-title {
      margin-top: 1.5rem;
      color: #007aff;
      font-size: 1.25rem;
      font-weight: bold;
      border-bottom: 2px solid #007aff;
      padding-bottom: 0.25rem;
    }

    .referee-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      background-color: #f9fafb;
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }

    .referee-group h4 {
      margin: 0;
      font-size: 1rem;
      font-weight: bold;
      color: #1e3a8a;
    }
  </style>
</head>
<body>

  <div class="application-container">
    <h2>Loan Application Form</h2>
    <form id="loanForm">

      <!-- Personal Details -->
      <div class="section-title">Personal Details</div>
      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" required>

      <label for="idNumber">National ID / Passport Number</label>
      <input type="text" id="idNumber" required>

      <label for="dob">Date of Birth</label>
      <input type="date" id="dob" required>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" placeholder="+254..." required>

      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="example@email.com" required>

      <label for="residence">Place of Residence</label>
      <input type="text" id="residence" placeholder="City / Town" required>

      <!-- Employment / Business -->
      <div class="section-title">Employment / Business</div>
      <label for="employmentType">Employment Type</label>
      <select id="employmentType" required>
        <option value="">Select</option>
        <option value="Salaried">Salaried</option>
        <option value="Self-Employed">Self-Employed</option>
        <option value="Business Owner">Business Owner</option>
        <option value="Other">Other</option>
      </select>

      <label for="employer">Employer / Business Name</label>
      <input type="text" id="employer" required>

      <label for="monthlyIncome">Monthly Income (Ksh)</label>
      <input type="number" id="monthlyIncome" required>

      <!-- Loan Details -->
      <div class="section-title">Loan Details</div>
      <label for="amount">Loan Amount (Ksh)</label>
      <input type="number" id="amount" required>

      <label for="term">Repayment Term (Months)</label>
      <select id="term" required>
        <option value="">Select Term</option>
        <option value="1">1 Month</option>
        <option value="3">3 Months</option>
        <option value="6">6 Months</option>
        <option value="12">12 Months</option>
      </select>

      <label for="purpose">Loan Purpose</label>
      <textarea id="purpose" rows="3" placeholder="E.g., school fees, business expansion, medical expenses" required></textarea>

      <!-- Referees -->
      <div class="section-title">Referees / Emergency Contacts</div>
      <div class="referee-group">
        <h4>Referee 1</h4>
        <input type="text" id="referee1Name" placeholder="Full Name" required>
        <input type="tel" id="referee1Phone" placeholder="Phone Number" required>
        <input type="text" id="referee1Relation" placeholder="Relation to you" required>
      </div>

      <div class="referee-group">
        <h4>Referee 2</h4>
        <input type="text" id="referee2Name" placeholder="Full Name" required>
        <input type="tel" id="referee2Phone" placeholder="Phone Number" required>
        <input type="text" id="referee2Relation" placeholder="Relation to you" required>
      </div>

      <button type="submit">Submit Application</button>
    </form>
  </div>

  <script src="scripts/main.js"></script>
</body>
</html>
